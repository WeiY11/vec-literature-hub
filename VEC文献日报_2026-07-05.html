    const rockGeo = new THREE.BoxGeometry(0.3 + Math.random()*0.4, 0.2 + Math.random()*0.3, 0.3 + Math.random()*0.4);
    const rock = new THREE.Mesh(rockGeo, rockMat);
    rock.position.set((Math.random()-0.5)*2, -1.5 - Math.random()*1.5, (Math.random()-0.5)*2);
    rock.rotation.set(Math.random()*0.5, Math.random()*0.5, Math.random()*0.5);
    group.add(rock);
  }

  // Point light
  const pLight = new THREE.PointLight(config.color, 1.5, 15);
  pLight.position.set(0, 3, 0);
  group.add(pLight);

  scene.add(group);
  return group;
}

function createBeacon(paper, islandGroup, index, total, config) {
  const angle = (index / total) * Math.PI * 2;
  const radius = 1.8;
  const x = Math.cos(angle) * radius;
  const z = Math.sin(angle) * radius;
  const y = 1.5;

  // Beacon sphere
  const geo = new THREE.SphereGeometry(0.2, 16, 16);
  const mat = new THREE.MeshStandardMaterial({
    color: paper.colorHex,
    emissive: paper.colorHex,
    emissiveIntensity: 0.6,
    metalness: 0.3,
    roughness: 0.4
  });
  const beacon = new THREE.Mesh(geo, mat);
  beacon.position.set(x, y, z);
  beacon.userData = { paperId: paper.id, baseEmissive: 0.6 };
  islandGroup.add(beacon);
  beacons.push(beacon);
  beaconData.push(paper);

  // Line to island surface
  const lineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(x, 1.0, z),
    new THREE.Vector3(x, y, z)
  ]);
  const lineMat = new THREE.LineBasicMaterial({ color: paper.colorHex, transparent: true, opacity: 0.4 });
  islandGroup.add(new THREE.Line(lineGeo, lineMat));

  // HTML label
  const labelDiv = document.createElement('div');
  labelDiv.className = 'label-3d';
  labelDiv.textContent = paper.shortTitle;
  labelDiv.style.color = paper.color;
  document.body.appendChild(labelDiv);
  labels3D.push({ el: labelDiv, beacon, islandGroup });

  return beacon;
}

// Create islands and beacons
islandConfigs.forEach((config, i) => {
  const island = createIsland(config);
  islands.push({ group: island, config, phase: i * 2.1 });
  const dirPapers = papers.filter(p => p.dirKey === config.dir);
  dirPapers.forEach((p, j) => createBeacon(p, island, j, dirPapers.length, config));
});

// Connect beacons within same island
islands.forEach((isl, i) => {
  const islBeacons = beacons.filter(b => {
    const p = beaconData.find(pd => pd.id === b.userData.paperId);
    return p && p.dirKey === isl.config.dir;
  });
  for (let a = 0; a < islBeacons.length; a++) {
    for (let b = a+1; b < islBeacons.length; b++) {
      const pA = islBeacons[a].position;
      const pB = islBeacons[b].position;
      const lineGeo = new THREE.BufferGeometry().setFromPoints([pA.clone(), pB.clone()]);
      const lineMat = new THREE.LineBasicMaterial({ color: isl.config.color, transparent: true, opacity: 0.15 });
      isl.group.add(new THREE.Line(lineGeo, lineMat));
    }
  }
});

// Cross-island curves
for (let i = 0; i < islands.length; i++) {
  for (let j = i+1; j < islands.length; j++) {
    const pA = new THREE.Vector3(...islands[i].config.pos).add(new THREE.Vector3(0, 2, 0));
    const pB = new THREE.Vector3(...islands[j].config.pos).add(new THREE.Vector3(0, 2, 0));
    const mid = pA.clone().add(pB).multiplyScalar(0.5).add(new THREE.Vector3(0, 5, 0));
    const curve = new THREE.QuadraticBezierCurve3(pA, mid, pB);
    const pts = curve.getPoints(30);
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const cA = new THREE.Color(islands[i].config.color);
    const cB = new THREE.Color(islands[j].config.color);
    const mixColor = cA.lerp(cB, 0.5);
    const mat = new THREE.LineBasicMaterial({ color: mixColor, transparent: true, opacity: 0.12 });
    scene.add(new THREE.Line(geo, mat));
  }
}

// ==================== RAYCASTER ====================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredBeacon = null;
const tooltip = document.getElementById('tooltip');

canvas.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(beacons);

  if (hoveredBeacon && (!intersects.length || intersects[0].object !== hoveredBeacon)) {
    hoveredBeacon.scale.set(1, 1, 1);
    hoveredBeacon.material.emissiveIntensity = hoveredBeacon.userData.baseEmissive;
    hoveredBeacon = null;
    tooltip.classList.remove('visible');
  }

  if (intersects.length > 0) {
    const obj = intersects[0].object;
    if (obj.userData.paperId !== undefined) {
      hoveredBeacon = obj;
      obj.scale.set(1.5, 1.5, 1.5);
      obj.material.emissiveIntensity = 1.2;
      const paper = beaconData.find(p => p.id === obj.userData.paperId);
      tooltip.textContent = paper.titleCn;
      tooltip.style.left = e.clientX + 'px';
      tooltip.style.top = e.clientY + 'px';
      tooltip.classList.add('visible');
    }
  }
});

canvas.addEventListener('click', (e) => {
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(beacons);
  if (intersects.length > 0) {
    const obj = intersects[0].object;
    if (obj.userData.paperId !== undefined) {
      openPanel(obj.userData.paperId);
    }
  }
});

// ==================== DETAIL PANEL ====================
const panel = document.getElementById('detailPanel');
const panelClose = document.getElementById('panelClose');
panelClose.addEventListener('click', () => panel.classList.remove('open'));

function starsHTML(n) {
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}

function openPanel(id) {
  const p = papers[id];
  document.getElementById('panelTitleEn').textContent = p.titleEn;
  document.getElementById('panelTitleCn').textContent = p.titleCn;

  const tagsEl = document.getElementById('panelTags');
  tagsEl.innerHTML = `<span class="tag direction" style="background:${p.color}22;color:${p.color};border-color:${p.color}44">${p.direction}</span>` +
    p.tags.map(t => `<span class="tag">${t}</span>`).join('');

  const alts = p.alternatives.split(' | ');
  const altHTML = alts.map(a => {
    const parts = a.split(': ');
    return `<div class="method-item"><div class="method-name" style="color:var(--accent-pink)">${parts[0]}</div><div class="method-desc">${parts.slice(1).join(': ')}</div></div>`;
  }).join('');

  document.getElementById('panelBody').innerHTML = `
    <div class="info-block">
      <div class="info-block-header"><span class="icon">👥</span> 作者团队</div>
      <div class="journal-info"><div class="journal-row"><span class="journal-value">${p.authorsDetail}</span></div></div>
    </div>
    <div class="info-block">
      <div class="info-block-header"><span class="icon">📖</span> 期刊/会议信息</div>
      <div class="journal-info">
        <div class="journal-row"><span class="journal-label">期刊</span><span class="journal-value">${p.journal}</span></div>
        <div class="journal-row"><span class="journal-label">IF/等级</span><span class="journal-value">${p.ifScore}</span></div>
        <div class="journal-row"><span class="journal-label">DOI</span><span class="journal-value"><a href="${p.doi}" target="_blank">${p.doi}</a></span></div>
      </div>
    </div>
    <div class="section-card problem">
      <div class="info-block-header"><span class="icon">🎯</span> 研究问题</div>
      <p>${p.problem}</p>
    </div>
    <div class="section-card solution">
      <div class="info-block-header"><span class="icon">🔬</span> 解决方法</div>
      <p>${p.solution}</p>
    </div>
    <div class="section-card alternatives">
      <div class="info-block-header"><span class="icon">🔄</span> 替代方案</div>
      <div class="methods-grid">${altHTML}</div>
    </div>
    <div class="info-block">
      <div class="info-block-header"><span class="icon">🔧</span> 核心方法与技术</div>
      <div class="methods-grid">
        ${p.methods.map(m => `<div class="method-item"><div class="method-name">${m.name}</div><div class="method-desc">${m.desc}</div></div>`).join('')}
      </div>
    </div>
    <div class="info-block">
      <div class="info-block-header"><span class="icon">⭐</span> 创新点与贡献</div>
      <div class="innovation-list">
        ${p.innovations.map(inn => `<div class="innovation-item"><span class="innovation-stars">${starsHTML(inn.stars)}</span><span class="innovation-text">${inn.text}</span></div>`).join('')}
      </div>
    </div>
    <div class="info-block">
      <div class="info-block-header"><span class="icon">📝</span> 中文摘要</div>
      <button class="abstract-toggle" onclick="this.nextElementSibling.classList.toggle('show')">展开/收起摘要 ▼</button>
      <div class="abstract-content">${p.abstract}</div>
    </div>
    <div class="section-card vec">
      <div class="info-block-header"><span class="icon">💡</span> VEC 关联性</div>
      <p>${p.vec}</p>
    </div>
  `;

  panel.classList.add('open');
}

// ==================== LEGEND CLICK ====================
document.querySelectorAll('.legend-item').forEach(item => {
  item.addEventListener('click', () => {
    const dir = item.dataset.direction;
    const idx = islandConfigs.findIndex(c => c.dir === dir);
    if (idx >= 0) {
      const target = new THREE.Vector3(...islandConfigs[idx].pos);
      const camTarget = target.clone().add(new THREE.Vector3(5, 8, 10));
      animateCamera(camTarget, target);
    }
  });
});

function animateCamera(toPos, toLook) {
  const startPos = camera.position.clone();
  const startTarget = controls.target.clone();
  const duration = 1000;
  const startTime = Date.now();
  function step() {
    const t = Math.min((Date.now() - startTime) / duration, 1);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    camera.position.lerpVectors(startPos, toPos, ease);
    controls.target.lerpVectors(startTarget, toLook, ease);
    controls.update();
    if (t < 1) requestAnimationFrame(step);
  }
  step();
}

// ==================== ANIMATION ====================
const clock = new THREE.Clock();

function updateLabels() {
  labels3D.forEach(({ el, beacon, islandGroup }) => {
    const worldPos = new THREE.Vector3();
    beacon.getWorldPosition(worldPos);
    worldPos.y += 0.4;
    const screenPos = worldPos.clone().project(camera);
    const x = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.opacity = screenPos.z > 1 ? '0' : '1';
  });
}

function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();

  // Island floating
  islands.forEach(isl => {
    isl.group.position.y = isl.config.pos[1] + Math.sin(time * 0.5 + isl.phase) * 0.3;
  });

  // Beacon pulse
  beacons.forEach(b => {
    if (b !== hoveredBeacon) {
      b.material.emissiveIntensity = b.userData.baseEmissive + Math.sin(time * 2 + b.userData.paperId) * 0.2;
    }
  });

  // Floating particles
  const fp = floatPoints.geometry.attributes.position;
  for (let i = 0; i < floatCount; i++) {
    fp.setY(i, fp.getY(i) + floatVel[i].y);
    fp.setX(i, fp.getX(i) + floatVel[i].x);
    fp.setZ(i, fp.getZ(i) + floatVel[i].z);
    if (fp.getY(i) > 15) {
      fp.setY(i, -10);
      fp.setX(i, (Math.random()-0.5)*40);
      fp.setZ(i, (Math.random()-0.5)*40);
    }
  }
  fp.needsUpdate = true;

  controls.update();
  updateLabels();
  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
