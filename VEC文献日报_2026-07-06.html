// ===== Three.js 3D Scene =====
let scene, camera, renderer, controls;
let islands = [], beacons = [], beaconMeshes = [];
let raycaster, mouse;
let hoveredBeacon = null, selectedPaper = null;
let clock = new THREE.Clock();
let labelElements = [];
const tooltip = document.getElementById('tooltip');
const ttTitle = document.getElementById('tt-title');
const ttDir = document.getElementById('tt-dir');

function init() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0a0a1a, 0.008);

  camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 12, 25);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x0a0a1a);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.minDistance = 8;
  controls.maxDistance = 60;
  controls.maxPolarAngle = Math.PI * 0.85;

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2(-999, -999);

  setupLights();
  createStarfield();
  createFloatingParticles();
  createIslands();
  createCrossConnections();
  createLabels();

  window.addEventListener('resize', onResize);
  renderer.domElement.addEventListener('mousemove', onMouseMove);
  renderer.domElement.addEventListener('click', onMouseClick);

  animate();
}

function setupLights() {
  scene.add(new THREE.AmbientLight(0x222244, 0.5));
  const hemi = new THREE.HemisphereLight(0x4488ff, 0x002244, 0.3);
  scene.add(hemi);
  const dir = new THREE.DirectionalLight(0xffffff, 0.5);
  dir.position.set(10, 20, 10);
  scene.add(dir);

  const islandPositions = getIslandPositions();
  const colors = [0x448aff, 0xb388ff, 0x00e5ff];
  islandPositions.forEach((pos, i) => {
    const pl = new THREE.PointLight(colors[i], 1.5, 15);
    pl.position.set(pos.x, pos.y + 3, pos.z);
    scene.add(pl);
  });
}

function getIslandPositions() {
  const r = 10;
  return [
    { x: 0, y: 0, z: -r * 0.7 },
    { x: -r * 0.7, y: 0, z: r * 0.5 },
    { x: r * 0.7, y: 0, z: r * 0.5 }
  ];
}

function createIsland(index) {
  const positions = getIslandPositions();
  const pos = positions[index];
  const group = new THREE.Group();
  group.position.set(pos.x, pos.y, pos.z);
  group.userData = { phase: index * 2.1, baseY: pos.y };

  const configs = [
    { topColor: 0x2a5a2a, rockColor: 0x3a2a1a, glowColor: 0x448aff },
    { topColor: 0x2a3a5a, rockColor: 0x2a1a3a, glowColor: 0xb388ff },
    { topColor: 0x1a4a4a, rockColor: 0x1a2a2a, glowColor: 0x00e5ff }
  ];
  const cfg = configs[index];

  // Main island body
  const geo = new THREE.CylinderGeometry(3, 1.5, 2, 8, 2);
  const posAttr = geo.attributes.position;
  for (let i = 0; i < posAttr.count; i++) {
    const x = posAttr.getX(i);
    const y = posAttr.getY(i);
    const z = posAttr.getZ(i);
    if (y < 0.5) {
      posAttr.setX(i, x + (Math.random() - 0.5) * 0.5);
      posAttr.setZ(i, z + (Math.random() - 0.5) * 0.5);
    }
    posAttr.setY(i, y + (Math.random() - 0.5) * 0.15);
  }
  geo.computeVertexNormals();

  const topMat = new THREE.MeshLambertMaterial({ color: cfg.topColor, flatShading: true });
  const rockMat = new THREE.MeshLambertMaterial({ color: cfg.rockColor, flatShading: true });
  const island = new THREE.Mesh(geo, [rockMat, topMat, rockMat]);
  group.add(island);

  // Glow ring
  const ringGeo = new THREE.RingGeometry(2.8, 3.2, 32);
  const ringMat = new THREE.MeshBasicMaterial({ color: cfg.glowColor, transparent: true, opacity: 0.25, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 1.05;
  group.add(ring);

  // Floating rocks below
  for (let i = 0; i < 4; i++) {
    const rockGeo = new THREE.BoxGeometry(0.3 + Math.random() * 0.4, 0.2 + Math.random() * 0.3, 0.3 + Math.random() * 0.4);
    const rock = new THREE.Mesh(rockGeo, rockMat);
    rock.position.set((Math.random() - 0.5) * 3, -1.5 - Math.random() * 1.5, (Math.random() - 0.5) * 3);
    rock.rotation.set(Math.random(), Math.random(), Math.random());
    group.add(rock);
  }

  scene.add(group);
  islands.push(group);
  return group;
}

function createIslands() {
  for (let i = 0; i < 3; i++) {
    createIsland(i);
  }
  createBeacons();
}

function createBeacons() {
  const positions = getIslandPositions();
  const dirCounts = [4, 3, 3];
  const dirColors = [0x448aff, 0xb388ff, 0x00e5ff];
  let paperIdx = 0;

  for (let d = 0; d < 3; d++) {
    const count = dirCounts[d];
    const center = positions[d];
    for (let b = 0; b < count; b++) {
      const angle = (b / count) * Math.PI * 2 + Math.PI / 4;
      const r = 1.8;
      const bx = center.x + Math.cos(angle) * r;
      const bz = center.z + Math.sin(angle) * r;
      const by = center.y + 1.8;

      const beaconGeo = new THREE.SphereGeometry(0.2, 16, 16);
      const beaconMat = new THREE.MeshStandardMaterial({
        color: dirColors[d],
        emissive: dirColors[d],
        emissiveIntensity: 0.6,
        metalness: 0.3,
        roughness: 0.4
      });
      const beacon = new THREE.Mesh(beaconGeo, beaconMat);
      beacon.position.set(bx, by, bz);
      beacon.userData = { paperId: paperIdx, dirIdx: d, baseEmissive: 0.6, phase: Math.random() * Math.PI * 2 };
      scene.add(beacon);
      beaconMeshes.push(beacon);

      // Connection line to island
      const lineGeo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(bx, by - 0.2, bz),
        new THREE.Vector3(center.x + Math.cos(angle) * 1.2, center.y + 1.1, center.z + Math.sin(angle) * 1.2)
      ]);
      const lineMat = new THREE.LineBasicMaterial({ color: dirColors[d], transparent: true, opacity: 0.3 });
      scene.add(new THREE.Line(lineGeo, lineMat));

      paperIdx++;
    }

    // Intra-island connections
    const islandBeacons = beaconMeshes.filter(b => b.userData.dirIdx === d);
    for (let i = 0; i < islandBeacons.length; i++) {
      for (let j = i + 1; j < islandBeacons.length; j++) {
        const lineGeo = new THREE.BufferGeometry().setFromPoints([
          islandBeacons[i].position.clone(),
          islandBeacons[j].position.clone()
        ]);
        const lineMat = new THREE.LineBasicMaterial({ color: dirColors[d], transparent: true, opacity: 0.15 });
        scene.add(new THREE.Line(lineGeo, lineMat));
      }
    }
  }
}

function createCrossConnections() {
  const positions = getIslandPositions();
  const colors = [0x448aff, 0xb388ff, 0x00e5ff];
  for (let i = 0; i < 3; i++) {
    for (let j = i + 1; j < 3; j++) {
      const p1 = new THREE.Vector3(positions[i].x, positions[i].y + 1.5, positions[i].z);
      const p2 = new THREE.Vector3(positions[j].x, positions[j].y + 1.5, positions[j].z);
      const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
      mid.y += 3;
      const curve = new THREE.QuadraticBezierCurve3(p1, mid, p2);
      const points = curve.getPoints(30);
      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const mixColor = new THREE.Color(colors[i]).lerp(new THREE.Color(colors[j]), 0.5);
      const mat = new THREE.LineBasicMaterial({ color: mixColor, transparent: true, opacity: 0.15 });
      scene.add(new THREE.Line(geo, mat));
    }
  }
}

function createStarfield() {
  const starGeo = new THREE.BufferGeometry();
  const starPositions = [];
  for (let i = 0; i < 2000; i++) {
    const r = 100 + Math.random() * 100;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    starPositions.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, transparent: true, opacity: 0.6 });
  scene.add(new THREE.Points(starGeo, starMat));
}

let floatingParticles;
function createFloatingParticles() {
  const geo = new THREE.BufferGeometry();
  const positions = [];
  for (let i = 0; i < 500; i++) {
    positions.push((Math.random() - 0.5) * 40, Math.random() * 20 - 5, (Math.random() - 0.5) * 40);
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({ color: 0x4488ff, size: 0.08, transparent: true, opacity: 0.4 });
  floatingParticles = new THREE.Points(geo, mat);
  scene.add(floatingParticles);
}

function createLabels() {
  const container = document.getElementById('labels-container');
  beaconMeshes.forEach((beacon, i) => {
    const label = document.createElement('div');
    label.className = 'beacon-label';
    label.textContent = papers[i].shortTitle;
    label.style.color = papers[i].color;
    container.appendChild(label);
    labelElements.push(label);
  });
}

function updateLabels() {
  beaconMeshes.forEach((beacon, i) => {
    const pos = beacon.position.clone();
    pos.y += 0.4;
    pos.project(camera);
    const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;
    const label = labelElements[i];
    if (pos.z < 1) {
      label.style.display = 'block';
      label.style.left = x + 'px';
      label.style.top = y + 'px';
    } else {
      label.style.display = 'none';
    }
  });
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function onMouseMove(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(beaconMeshes);

  if (hoveredBeacon && (!intersects.length || intersects[0].object !== hoveredBeacon)) {
    hoveredBeacon.scale.set(1, 1, 1);
    hoveredBeacon.material.emissiveIntensity = hoveredBeacon.userData.baseEmissive;
    hoveredBeacon = null;
    tooltip.classList.remove('visible');
    renderer.domElement.style.cursor = 'default';
  }

  if (intersects.length > 0) {
    const obj = intersects[0].object;
    if (obj !== hoveredBeacon) {
      hoveredBeacon = obj;
      hoveredBeacon.scale.set(1.5, 1.5, 1.5);
      hoveredBeacon.material.emissiveIntensity = 1.2;
      renderer.domElement.style.cursor = 'pointer';
    }
    const paper = papers[hoveredBeacon.userData.paperId];
    ttTitle.textContent = paper.shortTitle;
    ttDir.textContent = paper.direction + ' · ' + paper.journal;
    ttDir.style.color = paper.color;
    tooltip.style.left = (e.clientX + 15) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    tooltip.classList.add('visible');
  }
}

function onMouseClick(e) {
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(beaconMeshes);
  if (intersects.length > 0) {
    const paperId = intersects[0].object.userData.paperId;
    openDetail(paperId);
  }
}

function openDetail(paperId) {
  const p = papers[paperId];
  selectedPaper = paperId;
  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('detailContent');

  let starsHtml = (n) => '★'.repeat(n) + '☆'.repeat(5 - n);

  let methodsHtml = p.methods.map(m =>
    `<div class="method-card"><div class="method-name">${m.name}</div>${m.desc}</div>`
  ).join('');

  let innovHtml = p.innovations.map(inn =>
    `<li><span class="stars">${starsHtml(inn.stars)}</span>${inn.text}</li>`
  ).join('');

  let tagsHtml = p.tags.map(t => `<span class="tag-chip">${t}</span>`).join('');

  content.innerHTML = `
    <div class="en-title">${p.titleEn}</div>
    <div class="cn-title">${p.titleCn}</div>
    <span class="dir-tag" style="background:${p.color}22;color:${p.color};border:1px solid ${p.color}44">${p.direction}</span>
    <div class="journal-info">
      <strong>${p.journal}</strong><br>
      ${p.ifScore}<br>
      ${p.authors}<br>
      <a href="${p.doi}" target="_blank">DOI ↗</a>
    </div>
    <div class="detail-section">
      <div class="section-title">🎯 研究问题</div>
      <div class="section-body section-problem">${p.problem}</div>
    </div>
    <div class="detail-section">
      <div class="section-title">🔬 解决方法</div>
      <div class="section-body section-solution">${p.solution}</div>
    </div>
    <div class="detail-section">
      <div class="section-title">🔄 替代方案</div>
      <div class="section-body section-alternatives">${p.alternatives}</div>
    </div>
    <div class="detail-section">
      <div class="section-title">🔧 核心方法与技术</div>
      <div class="methods-grid">${methodsHtml}</div>
    </div>
    <div class="detail-section">
      <div class="section-title">⭐ 创新点与贡献</div>
      <ul class="innovation-list">${innovHtml}</ul>
    </div>
    <div class="detail-section">
      <div class="abstract-toggle" onclick="toggleAbstract()">📝 中文摘要 ▼</div>
      <div class="abstract-text" id="abstractText">${p.abstract}</div>
    </div>
    <div class="tags-row">${tagsHtml}</div>
    <div class="vec-comment">💡 <strong>VEC关联性：</strong>${p.vec}</div>
  `;

  panel.classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  selectedPaper = null;
}

function toggleAbstract() {
  const el = document.getElementById('abstractText');
  el.classList.toggle('expanded');
}

function focusIsland(idx) {
  const positions = getIslandPositions();
  const target = positions[idx];
  const dest = { x: target.x + 5, y: 8, z: target.z + 10 };
  const start = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
  const duration = 1000;
  const startTime = Date.now();

  function animateCamera() {
    const elapsed = Date.now() - startTime;
    const t = Math.min(elapsed / duration, 1);
    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    camera.position.set(
      start.x + (dest.x - start.x) * ease,
      start.y + (dest.y - start.y) * ease,
      start.z + (dest.z - start.z) * ease
    );
    controls.target.set(target.x, target.y + 1, target.z);
    controls.update();
    if (t < 1) requestAnimationFrame(animateCamera);
  }
  animateCamera();
}

function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();

  // Island floating
  islands.forEach((island, i) => {
    island.position.y = island.userData.baseY + Math.sin(time * 0.5 + island.userData.phase) * 0.3;
  });

  // Beacon breathing
  beaconMeshes.forEach((b) => {
    const pulse = 0.4 + Math.sin(time * 2 + b.userData.phase) * 0.3;
    if (b !== hoveredBeacon) {
      b.material.emissiveIntensity = pulse;
    }
    b.position.y += Math.sin(time * 0.5 + b.userData.phase) * 0.001;
  });

  // Floating particles drift
  if (floatingParticles) {
    const posArr = floatingParticles.geometry.attributes.position.array;
    for (let i = 0; i < posArr.length; i += 3) {
      posArr[i + 1] += 0.003;
      if (posArr[i + 1] > 15) posArr[i + 1] = -5;
    }
    floatingParticles.geometry.attributes.position.needsUpdate = true;
  }

  controls.update();
  updateLabels();
  renderer.render(scene, camera);
}

init();
</script>
