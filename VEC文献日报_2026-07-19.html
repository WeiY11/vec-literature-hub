// ===== Three.js 3D Scene =====
var scene, camera, renderer, controls;
var islands = [], beacons = [], beaconMeshes = [];
var raycaster, mouse;
var hoveredBeacon = null, selectedPaper = null;
var clock = new THREE.Clock();
var labelElements = [];
var tooltip = document.getElementById('tooltip');
var ttTitle = document.getElementById('tt-title');
var ttDir = document.getElementById('tt-dir');

function init() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0a0a1a, 0.008);

  camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 12, 25);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x0a0a1a);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.minDistance = 8;
  controls.maxDistance = 60;
  controls.maxPolarAngle = Math.PI * 0.85;

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2(-999, -999);

  setupLights();
  createStarfield();
  createFloatingParticles();
  createIslands();
  createCrossConnections();
  createLabels();

  window.addEventListener('resize', onResize);
  renderer.domElement.addEventListener('mousemove', onMouseMove);
  renderer.domElement.addEventListener('click', onMouseClick);

  animate();
}

function setupLights() {
  scene.add(new THREE.AmbientLight(0x222244, 0.5));
  scene.add(new THREE.HemisphereLight(0x4488ff, 0x002244, 0.3));
  var dir = new THREE.DirectionalLight(0xffffff, 0.5);
  dir.position.set(10, 20, 10);
  scene.add(dir);

  var islandPositions = getIslandPositions();
  var colors = [0x448aff, 0xb388ff, 0x00e5ff];
  islandPositions.forEach(function(pos, i) {
    var pl = new THREE.PointLight(colors[i], 1.5, 15);
    pl.position.set(pos.x, pos.y + 3, pos.z);
    scene.add(pl);
  });
}

function getIslandPositions() {
  var r = 10;
  return [
    { x: 0, y: 0, z: -r * 0.7 },
    { x: -r * 0.7, y: 0, z: r * 0.5 },
    { x: r * 0.7, y: 0, z: r * 0.5 }
  ];
}

function createIsland(index) {
  var positions = getIslandPositions();
  var pos = positions[index];
  var group = new THREE.Group();
  group.position.set(pos.x, pos.y, pos.z);
  group.userData = { phase: index * 2.1, baseY: pos.y };

  var configs = [
    { topColor: 0x2a5a2a, rockColor: 0x3a2a1a, glowColor: 0x448aff },
    { topColor: 0x2a3a5a, rockColor: 0x2a1a3a, glowColor: 0xb388ff },
    { topColor: 0x1a4a4a, rockColor: 0x1a2a2a, glowColor: 0x00e5ff }
  ];
  var cfg = configs[index];

  var geo = new THREE.CylinderGeometry(3, 1.5, 2, 8, 2);
  var posAttr = geo.attributes.position;
  for (var i = 0; i < posAttr.count; i++) {
    var x = posAttr.getX(i), y = posAttr.getY(i), z = posAttr.getZ(i);
    if (y < 0.5) {
      posAttr.setX(i, x + (Math.random() - 0.5) * 0.5);
      posAttr.setZ(i, z + (Math.random() - 0.5) * 0.5);
    }
    posAttr.setY(i, y + (Math.random() - 0.5) * 0.15);
  }
  geo.computeVertexNormals();

  var topMat = new THREE.MeshLambertMaterial({ color: cfg.topColor, flatShading: true });
  var rockMat = new THREE.MeshLambertMaterial({ color: cfg.rockColor, flatShading: true });
  group.add(new THREE.Mesh(geo, [rockMat, topMat, rockMat]));

  var ringGeo = new THREE.RingGeometry(2.8, 3.2, 32);
  var ringMat = new THREE.MeshBasicMaterial({ color: cfg.glowColor, transparent: true, opacity: 0.25, side: THREE.DoubleSide });
  var ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 1.05;
  group.add(ring);

  for (var j = 0; j < 4; j++) {
    var rockGeo = new THREE.BoxGeometry(0.3 + Math.random() * 0.4, 0.2 + Math.random() * 0.3, 0.3 + Math.random() * 0.4);
    var rock = new THREE.Mesh(rockGeo, rockMat);
    rock.position.set((Math.random() - 0.5) * 3, -1.5 - Math.random() * 1.5, (Math.random() - 0.5) * 3);
    rock.rotation.set(Math.random(), Math.random(), Math.random());
    group.add(rock);
  }

  scene.add(group);
  islands.push(group);
}

function createIslands() {
  for (var i = 0; i < 3; i++) createIsland(i);
  createBeacons();
}

function createBeacons() {
  var positions = getIslandPositions();
  var dirNames = ['\u8fb9\u7f18\u8ba1\u7b97', '\u8fb9\u7f18\u667a\u80fd', '\u8fb9\u7f18\u5927\u6a21\u578b'];
  var dirColors = [0x448aff, 0xb388ff, 0x00e5ff];
  var paperIdx = 0;

  for (var d = 0; d < 3; d++) {
    var dirPapers = papers.filter(function(p) { return p.direction === dirNames[d]; });
    var count = dirPapers.length;
    var center = positions[d];
    for (var b = 0; b < count; b++) {
      var angle = (b / count) * Math.PI * 2 + Math.PI / 4;
      var r = 1.8;
      var bx = center.x + Math.cos(angle) * r;
      var bz = center.z + Math.sin(angle) * r;
      var by = center.y + 1.8;

      var beaconGeo = new THREE.SphereGeometry(0.2, 16, 16);
      var beaconMat = new THREE.MeshStandardMaterial({
        color: dirColors[d], emissive: dirColors[d],
        emissiveIntensity: 0.6, metalness: 0.3, roughness: 0.4
      });
      var beacon = new THREE.Mesh(beaconGeo, beaconMat);
      beacon.position.set(bx, by, bz);
      beacon.userData = { paperId: paperIdx, dirIdx: d, baseEmissive: 0.6, phase: Math.random() * Math.PI * 2 };
      scene.add(beacon);
      beaconMeshes.push(beacon);

      var lineGeo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(bx, by - 0.2, bz),
        new THREE.Vector3(center.x + Math.cos(angle) * 1.2, center.y + 1.1, center.z + Math.sin(angle) * 1.2)
      ]);
      scene.add(new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: dirColors[d], transparent: true, opacity: 0.3 })));
      paperIdx++;
    }

    var islandBeacons = beaconMeshes.filter(function(bb) { return bb.userData.dirIdx === d; });
    for (var ii = 0; ii < islandBeacons.length; ii++) {
      for (var jj = ii + 1; jj < islandBeacons.length; jj++) {
        var lg = new THREE.BufferGeometry().setFromPoints([islandBeacons[ii].position.clone(), islandBeacons[jj].position.clone()]);
        scene.add(new THREE.Line(lg, new THREE.LineBasicMaterial({ color: dirColors[d], transparent: true, opacity: 0.15 })));
      }
    }
  }
}

function createCrossConnections() {
  var positions = getIslandPositions();
  var colors = [0x448aff, 0xb388ff, 0x00e5ff];
  for (var i = 0; i < 3; i++) {
    for (var j = i + 1; j < 3; j++) {
      var p1 = new THREE.Vector3(positions[i].x, positions[i].y + 1.5, positions[i].z);
      var p2 = new THREE.Vector3(positions[j].x, positions[j].y + 1.5, positions[j].z);
      var mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
      mid.y += 3;
      var curve = new THREE.QuadraticBezierCurve3(p1, mid, p2);
      var geo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(30));
      var mixColor = new THREE.Color(colors[i]).lerp(new THREE.Color(colors[j]), 0.5);
      scene.add(new THREE.Line(geo, new THREE.LineBasicMaterial({ color: mixColor, transparent: true, opacity: 0.15 })));
    }
  }
}

function createStarfield() {
  var starGeo = new THREE.BufferGeometry();
  var sp = [];
  for (var i = 0; i < 2000; i++) {
    var r = 100 + Math.random() * 100;
    var theta = Math.random() * Math.PI * 2;
    var phi = Math.acos(2 * Math.random() - 1);
    sp.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(sp, 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, transparent: true, opacity: 0.6 })));
}

var floatingParticles;
function createFloatingParticles() {
  var geo = new THREE.BufferGeometry();
  var pos = [];
  for (var i = 0; i < 500; i++) pos.push((Math.random() - 0.5) * 40, Math.random() * 20 - 5, (Math.random() - 0.5) * 40);
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  floatingParticles = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x4488ff, size: 0.08, transparent: true, opacity: 0.4 }));
  scene.add(floatingParticles);
}

function createLabels() {
  var container = document.getElementById('labels-container');
  beaconMeshes.forEach(function(beacon, i) {
    var label = document.createElement('div');
    label.className = 'beacon-label';
    label.textContent = papers[i].shortTitle;
    label.style.color = papers[i].color;
    container.appendChild(label);
    labelElements.push(label);
  });
}

function updateLabels() {
  beaconMeshes.forEach(function(beacon, i) {
    var pos = beacon.position.clone();
    pos.y += 0.4;
    pos.project(camera);
    var x = (pos.x * 0.5 + 0.5) * window.innerWidth;
    var y = (-pos.y * 0.5 + 0.5) * window.innerHeight;
    var label = labelElements[i];
    if (pos.z < 1) { label.style.display = 'block'; label.style.left = x + 'px'; label.style.top = y + 'px'; }
    else { label.style.display = 'none'; }
  });
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function onMouseMove(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  var intersects = raycaster.intersectObjects(beaconMeshes);

  if (hoveredBeacon && (!intersects.length || intersects[0].object !== hoveredBeacon)) {
    hoveredBeacon.scale.set(1, 1, 1);
    hoveredBeacon.material.emissiveIntensity = hoveredBeacon.userData.baseEmissive;
    hoveredBeacon = null;
    tooltip.classList.remove('visible');
    renderer.domElement.style.cursor = 'default';
  }

  if (intersects.length > 0) {
    var obj = intersects[0].object;
    if (obj !== hoveredBeacon) {
      hoveredBeacon = obj;
      hoveredBeacon.scale.set(1.5, 1.5, 1.5);
      hoveredBeacon.material.emissiveIntensity = 1.2;
      renderer.domElement.style.cursor = 'pointer';
    }
    var paper = papers[hoveredBeacon.userData.paperId];
    ttTitle.textContent = paper.shortTitle;
    ttDir.textContent = paper.direction + ' \u00b7 ' + paper.journal;
    ttDir.style.color = paper.color;
    tooltip.style.left = (e.clientX + 15) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    tooltip.classList.add('visible');
  }
}

function onMouseClick(e) {
  raycaster.setFromCamera(mouse, camera);
  var intersects = raycaster.intersectObjects(beaconMeshes);
  if (intersects.length > 0) openDetail(intersects[0].object.userData.paperId);
}

function openDetail(paperId) {
  var p = papers[paperId];
  selectedPaper = paperId;
  var panel = document.getElementById('detailPanel');
  var content = document.getElementById('detailContent');

  function starsHtml(n) { return '\u2605'.repeat(n) + '\u2606'.repeat(5 - n); }

  var methodsHtml = p.methods.map(function(m) {
    return '<div class="method-card"><div class="method-name">' + m.name + '</div>' + m.desc + '</div>';
  }).join('');

  var innovHtml = p.innovations.map(function(inn) {
    return '<li><span class="stars">' + starsHtml(inn.stars) + '</span>' + inn.text + '</li>';
  }).join('');

  var tagsHtml = p.tags.map(function(t) { return '<span class="tag-chip">' + t + '</span>'; }).join('');

  content.innerHTML =
    '<div class="en-title">' + p.titleEn + '</div>' +
    '<div class="cn-title">' + p.titleCn + '</div>' +
    '<span class="dir-tag" style="background:' + p.color + '22;color:' + p.color + ';border:1px solid ' + p.color + '44">' + p.direction + '</span>' +
    '<div class="journal-info"><strong>' + p.journal + '</strong><br>' + p.ifScore + '<br>' + p.authors + '<br><a href="' + p.doi + '" target="_blank">DOI \u2197</a></div>' +
    '<div class="detail-section"><div class="section-title">\uD83C\uDFAF \u7814\u7a76\u95ee\u9898</div><div class="section-body section-problem">' + p.problem + '</div></div>' +
    '<div class="detail-section"><div class="section-title">\uD83D\uDD2C \u89e3\u51b3\u65b9\u6cd5</div><div class="section-body section-solution">' + p.solution + '</div></div>' +
    '<div class="detail-section"><div class="section-title">\uD83D\uDD04 \u66ff\u4ee3\u65b9\u6848</div><div class="section-body section-alternatives">' + p.alternatives + '</div></div>' +
    '<div class="detail-section"><div class="section-title">\uD83D\uDD27 \u6838\u5fc3\u65b9\u6cd5\u4e0e\u6280\u672f</div><div class="methods-grid">' + methodsHtml + '</div></div>' +
    '<div class="detail-section"><div class="section-title">\u2B50 \u521b\u65b0\u70b9\u4e0e\u8d21\u732e</div><ul class="innovation-list">' + innovHtml + '</ul></div>' +
    '<div class="detail-section"><div class="abstract-toggle" onclick="toggleAbstract()">\uD83D\uDCDD \u4e2d\u6587\u6458\u8981 \u25BC</div><div class="abstract-text" id="abstractText">' + p.abstract + '</div></div>' +
    '<div class="tags-row">' + tagsHtml + '</div>' +
    '<div class="vec-comment">\uD83D\uDCA1 <strong>VEC\u5173\u8054\u6027\uff1a</strong>' + p.vec + '</div>';

  panel.classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  selectedPaper = null;
}

function toggleAbstract() {
  document.getElementById('abstractText').classList.toggle('expanded');
}

function focusIsland(idx) {
  var positions = getIslandPositions();
  var target = positions[idx];
  var dest = { x: target.x + 5, y: 8, z: target.z + 10 };
  var start = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
  var startTime = Date.now();

  function animateCamera() {
    var elapsed = Date.now() - startTime;
    var t = Math.min(elapsed / 1000, 1);
    var ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    camera.position.set(
      start.x + (dest.x - start.x) * ease,
      start.y + (dest.y - start.y) * ease,
      start.z + (dest.z - start.z) * ease
    );
    controls.target.set(target.x, target.y + 1, target.z);
    controls.update();
    if (t < 1) requestAnimationFrame(animateCamera);
  }
  animateCamera();
}

function animate() {
  requestAnimationFrame(animate);
  var time = clock.getElapsedTime();

  islands.forEach(function(island) {
    island.position.y = island.userData.baseY + Math.sin(time * 0.5 + island.userData.phase) * 0.3;
  });

  beaconMeshes.forEach(function(b) {
    var pulse = 0.4 + Math.sin(time * 2 + b.userData.phase) * 0.3;
    if (b !== hoveredBeacon) b.material.emissiveIntensity = pulse;
    b.position.y += Math.sin(time * 0.5 + b.userData.phase) * 0.001;
  });

  if (floatingParticles) {
    var posArr = floatingParticles.geometry.attributes.position.array;
    for (var i = 0; i < posArr.length; i += 3) {
      posArr[i + 1] += 0.003;
      if (posArr[i + 1] > 15) posArr[i + 1] = -5;
    }
    floatingParticles.geometry.attributes.position.needsUpdate = true;
  }

  controls.update();
  updateLabels();
  renderer.render(scene, camera);
}

init();
</script>
