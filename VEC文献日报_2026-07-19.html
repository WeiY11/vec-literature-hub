:root {
  --bg: #06060f;
  --surface: rgba(15, 15, 35, 0.75);
  --surface-solid: #0f0f23;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --text-1: #f0f0f8;
  --text-2: #a0a0c0;
  --text-3: #606080;
  --blue: #5b8def;
  --purple: #a78bfa;
  --cyan: #22d3ee;
  --orange: #fb923c;
  --green: #4ade80;
  --pink: #f472b6;
  --yellow: #fbbf24;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; }
body {
  background: var(--bg);
  color: var(--text-1);
  font-family: 'Inter', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  -webkit-font-smoothing: antialiased;
}
canvas#scene { position:fixed; inset:0; z-index:1; }

/* ===== Title Bar ===== */
.topbar {
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; justify-content:space-between; align-items:flex-start;
  padding:24px 32px;
  background:linear-gradient(180deg, rgba(6,6,15,0.9) 0%, transparent 100%);
  pointer-events:none;
}
.topbar-left h1 {
  font-size:20px; font-weight:700; letter-spacing:-0.3px;
  background:linear-gradient(135deg, #fff 0%, var(--text-2) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.topbar-left .sub {
  font-size:11px; color:var(--text-3); margin-top:4px;
  letter-spacing:2px; text-transform:uppercase; font-weight:500;
}
.topbar-right {
  text-align:right; pointer-events:auto;
}
.topbar-right .date {
  font-size:28px; font-weight:200; color:var(--text-2);
  font-variant-numeric:tabular-nums; letter-spacing:1px;
}
.topbar-right .weekday {
  font-size:11px; color:var(--text-3); margin-top:2px;
}

/* ===== Legend ===== */
.legend {
  position:fixed; left:24px; top:50%; transform:translateY(-50%);
  z-index:100; display:flex; flex-direction:column; gap:6px;
}
.legend-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 16px; border-radius:var(--radius-sm);
  background:var(--surface); border:1px solid var(--border);
  backdrop-filter:blur(20px); cursor:pointer;
  transition:all 0.25s ease; user-select:none;
}
.legend-item:hover { border-color:var(--border-hover); background:rgba(20,20,45,0.85); transform:translateX(4px); }
.legend-item.active { border-color:rgba(255,255,255,0.2); }
.legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.legend-label { font-size:12px; font-weight:500; color:var(--text-2); white-space:nowrap; }
.legend-count {
  margin-left:auto; font-size:10px; font-weight:600;
  color:var(--text-3); background:rgba(255,255,255,0.05);
  padding:2px 8px; border-radius:6px;
}

/* ===== Stats ===== */
.stats {
  position:fixed; bottom:24px; right:24px; z-index:100;
  display:flex; gap:8px;
}
.stat {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:14px 20px;
  backdrop-filter:blur(20px); text-align:center; min-width:80px;
}
.stat-val {
  font-size:22px; font-weight:700;
  background:linear-gradient(135deg, var(--blue), var(--cyan));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.stat-lbl { font-size:9px; color:var(--text-3); margin-top:3px; text-transform:uppercase; letter-spacing:1px; font-weight:600; }

/* ===== Hint ===== */
.hint {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  z-index:100; font-size:11px; color:var(--text-3);
  background:var(--surface); border:1px solid var(--border);
  padding:8px 20px; border-radius:20px; backdrop-filter:blur(20px);
  transition:opacity 0.5s; pointer-events:none;
}

/* ===== Tooltip ===== */
.tip {
  position:fixed; z-index:200; pointer-events:none;
  background:rgba(10,10,25,0.92); border:1px solid var(--border-hover);
  border-radius:var(--radius-sm); padding:12px 16px;
  backdrop-filter:blur(16px); max-width:300px;
  opacity:0; transform:translateY(4px);
  transition:opacity 0.15s, transform 0.15s;
  box-shadow:var(--shadow);
}
.tip.show { opacity:1; transform:translateY(0); }
.tip-title { font-size:12px; font-weight:600; line-height:1.4; margin-bottom:4px; }
.tip-meta { font-size:10px; color:var(--text-3); }

/* ===== Detail Panel ===== */
.panel {
  position:fixed; top:0; right:0; bottom:0; width:480px; z-index:300;
  background:rgba(10,10,25,0.88); border-left:1px solid var(--border);
  backdrop-filter:blur(24px);
  transform:translateX(100%); transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);
  overflow-y:auto; overflow-x:hidden;
  box-shadow:-8px 0 40px rgba(0,0,0,0.3);
}
.panel.open { transform:translateX(0); }
.panel::-webkit-scrollbar { width:3px; }
.panel::-webkit-scrollbar-track { background:transparent; }
.panel::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }

.panel-inner { padding:32px 28px 48px; }
.panel-close {
  position:sticky; top:0; z-index:10; float:right;
  width:36px; height:36px; border-radius:50%;
  background:rgba(255,255,255,0.06); border:1px solid var(--border);
  color:var(--text-2); font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s;
}
.panel-close:hover { background:rgba(255,255,255,0.12); color:#fff; }

.p-dir {
  display:inline-flex; align-items:center; gap:6px;
  padding:4px 14px; border-radius:20px; font-size:11px; font-weight:600;
  margin-bottom:16px;
}
.p-dir-dot { width:6px; height:6px; border-radius:50%; }
.p-en { font-size:17px; font-weight:700; line-height:1.5; margin-bottom:6px; letter-spacing:-0.2px; }
.p-cn { font-size:13px; color:var(--text-2); margin-bottom:20px; line-height:1.5; }

.p-meta {

  font-size:12px; line-height:2; color:var(--text-2);

.p-meta strong { color:var(--text-1); font-weight:600; }
.p-meta a { color:var(--cyan); text-decoration:none; }

.p-section { margin-bottom:20px; }
.p-section-hd {

  font-size:12px; font-weight:700; color:var(--text-1);
  margin-bottom:10px; text-transform:uppercase; letter-spacing:0.5px;
}
.p-section-hd .icon { font-size:14px; }
.p-section-hd .line { flex:1; height:1px; background:var(--border); }

.p-body { font-size:13px; line-height:1.8; color:var(--text-2); }
.p-body.accent-orange { border-left:2px solid var(--orange); padding-left:14px; }
.p-body.accent-green { border-left:2px solid var(--green); padding-left:14px; }
.p-body.accent-purple { border-left:2px solid var(--purple); padding-left:14px; }

.method-item {
  background:rgba(255,255,255,0.02); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:12px 16px; margin-bottom:8px;
  transition:border-color 0.2s;

.method-item:hover { border-color:var(--border-hover); }
.method-name { font-size:12px; font-weight:700; color:var(--text-1); margin-bottom:3px; }
.method-desc { font-size:12px; color:var(--text-2); line-height:1.6; }

.innov-item {

  border-bottom:1px solid rgba(255,255,255,0.03);
  font-size:12px; line-height:1.6; color:var(--text-2);

.innov-item:last-child { border-bottom:none; }
.innov-stars { color:var(--yellow); font-size:10px; white-space:nowrap; padding-top:2px; }

.abstract-btn {
  cursor:pointer; color:var(--cyan); font-size:12px; font-weight:600;
  user-select:none; display:flex; align-items:center; gap:6px;
  transition:color 0.2s;
}
.abstract-btn:hover { color:#67e8f9; }
.abstract-body {
  font-size:12px; line-height:1.9; color:var(--text-2);
  max-height:0; overflow:hidden; transition:max-height 0.4s ease;
  margin-top:0;

.abstract-body.open { max-height:500px; margin-top:10px; }

.tags { display:flex; flex-wrap:wrap; gap:6px; margin:16px 0; }
.tag {
  padding:4px 12px; border-radius:8px; font-size:10px; font-weight:600;
  background:rgba(255,255,255,0.04); border:1px solid var(--border);
  color:var(--text-3); transition:all 0.2s;

.tag:hover { border-color:var(--border-hover); color:var(--text-2); }

.vec-box {
  background:rgba(34,211,238,0.04); border:1px solid rgba(34,211,238,0.12);

.vec-box strong { color:var(--cyan); }

/* ===== Node Labels ===== */
.node-label {
  position:absolute; pointer-events:none; z-index:50;
  font-size:9px; font-weight:600; letter-spacing:0.5px;
  text-shadow:0 1px 4px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.5);
  white-space:nowrap; transform:translate(-50%,-100%);
  transition:opacity 0.2s;
}

@media (max-width:900px) {
  .panel { width:100%; }
  .legend { left:12px; }
  .stats { display:none; }
  .topbar { padding:16px 20px; }
}
</style>

// ===== Three.js Scene =====
let scene, camera, renderer, controls, clock;
let hubMeshes = [], nodeMeshes = [], edgeLines = [];
let raycaster, mouse = new THREE.Vector2(-9,-9);
let hovered = null, labelEls = [];
const tip = document.getElementById('tip');

function init(){
  clock = new THREE.Clock();
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x06060f, 0.012);

  camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 500);
  camera.position.set(0, 14, 28);

  renderer = new THREE.WebGLRenderer({ canvas:document.getElementById('scene'), antialias:true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setClearColor(0x06060f);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 10;
  controls.maxDistance = 55;
  controls.maxPolarAngle = Math.PI * 0.82;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.3;

  raycaster = new THREE.Raycaster();

  buildLights();
  buildGrid();
  buildStars();
  buildDust();
  buildGraph();
  buildLabels();

  addEventListener('resize', onResize);
  renderer.domElement.addEventListener('mousemove', onMove);
  renderer.domElement.addEventListener('click', onClick);
  renderer.domElement.addEventListener('pointerdown', ()=>{ controls.autoRotate=false; });

  animate();
}

function buildLights(){
  scene.add(new THREE.AmbientLight(0x1a1a3a, 0.6));
  scene.add(new THREE.HemisphereLight(0x3344aa, 0x0a0a1a, 0.4));
  const d1 = new THREE.DirectionalLight(0xffffff, 0.4);
  d1.position.set(8, 20, 12);
  scene.add(d1);
  const d2 = new THREE.DirectionalLight(0x4466ff, 0.2);
  d2.position.set(-10, 5, -8);
  scene.add(d2);
}

function buildGrid(){
  const grid = new THREE.GridHelper(60, 60, 0x111133, 0x0a0a22);
  grid.position.y = -3;
  grid.material.transparent = true;
  grid.material.opacity = 0.3;
  scene.add(grid);
}

function buildStars(){
  const g = new THREE.BufferGeometry();
  const p = [];
  for(let i=0;i<3000;i++){
    const r = 80+Math.random()*120;
    const th = Math.random()*Math.PI*2;
    const ph = Math.acos(2*Math.random()-1);
    p.push(r*Math.sin(ph)*Math.cos(th), r*Math.sin(ph)*Math.sin(th), r*Math.cos(ph));
  }
  g.setAttribute('position', new THREE.Float32BufferAttribute(p,3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({color:0xffffff,size:0.25,transparent:true,opacity:0.5})));
}

let dust;
function buildDust(){
  const g = new THREE.BufferGeometry();
  const p = [];
  for(let i=0;i<600;i++) p.push((Math.random()-0.5)*50, Math.random()*25-5, (Math.random()-0.5)*50);
  g.setAttribute('position', new THREE.Float32BufferAttribute(p,3));
  dust = new THREE.Points(g, new THREE.PointsMaterial({color:0x4466cc,size:0.06,transparent:true,opacity:0.35}));
  scene.add(dust);
}

function hubPos(i){
  const R = 9;
  const angles = [-Math.PI/2, Math.PI/6, Math.PI*5/6];
  return new THREE.Vector3(Math.cos(angles[i])*R, 0, Math.sin(angles[i])*R);
}

function buildGraph(){
  // Hubs
  DIRS.forEach((dir,i)=>{
    const pos = hubPos(i);
    const g = new THREE.Group();
    g.position.copy(pos);

    // Core sphere
    const core = new THREE.Mesh(
      new THREE.IcosahedronGeometry(1.2, 2),
      new THREE.MeshStandardMaterial({ color:dir.hex, emissive:dir.hex, emissiveIntensity:0.35, metalness:0.6, roughness:0.25, transparent:true, opacity:0.9 })
    );
    g.add(core);

    // Wireframe shell
    const shell = new THREE.Mesh(
      new THREE.IcosahedronGeometry(1.6, 1),
      new THREE.MeshBasicMaterial({ color:dir.hex, wireframe:true, transparent:true, opacity:0.12 })
    );
    g.add(shell);

    // Glow ring
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(2.0, 2.15, 48),
      new THREE.MeshBasicMaterial({ color:dir.hex, transparent:true, opacity:0.15, side:THREE.DoubleSide })
    );
    ring.rotation.x = -Math.PI/2;
    ring.position.y = -0.5;
    g.add(ring);

    // Point light
    const pl = new THREE.PointLight(dir.hex, 1.2, 12);
    pl.position.y = 2;
    g.add(pl);

    g.userData = { dirIdx:i, phase:i*2.1, shell, ring, core };
    scene.add(g);
    hubMeshes.push(g);
  });

  // Paper nodes
  let pIdx = 0;
  DIRS.forEach((dir,di)=>{
    const dirPapers = papers.filter(p=>p.direction===dir.name);
    const hub = hubPos(di);
    const n = dirPapers.length;
    dirPapers.forEach((p,bi)=>{
      const angle = (bi/n)*Math.PI*2 + Math.PI/4 + di*0.5;
      const r = 3.2 + (bi%2)*0.8;
      const y = 1.5 + Math.sin(bi*1.7)*0.8;
      const pos = new THREE.Vector3(
        hub.x + Math.cos(angle)*r,
        y,
        hub.z + Math.sin(angle)*r
      );

      // Node sphere
      const size = 0.28 + (p.ifScore && !p.ifScore.includes('预印本') ? 0.1 : 0);
      const node = new THREE.Mesh(
        new THREE.SphereGeometry(size, 20, 20),
        new THREE.MeshStandardMaterial({ color:dir.hex, emissive:dir.hex, emissiveIntensity:0.5, metalness:0.4, roughness:0.3 })
      );
      node.position.copy(pos);
      node.userData = { paperId:pIdx, dirIdx:di, baseY:y, phase:Math.random()*Math.PI*2, baseEmissive:0.5 };
      scene.add(node);
      nodeMeshes.push(node);

      // Connection to hub (curved)
      const mid = new THREE.Vector3().addVectors(hub, pos).multiplyScalar(0.5);
      mid.y += 1.5;
      const curve = new THREE.QuadraticBezierCurve3(hub.clone().setY(0.5), mid, pos);
      const lineGeo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(24));
      const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color:dir.hex, transparent:true, opacity:0.18 }));
      scene.add(line);
      edgeLines.push(line);

      pIdx++;
    });
  });

  // Cross-direction connections (subtle)
  for(let i=0;i<3;i++){
    for(let j=i+1;j<3;j++){
      const p1 = hubPos(i).clone().setY(0.5);
      const p2 = hubPos(j).clone().setY(0.5);
      const mid = p1.clone().add(p2).multiplyScalar(0.5);
      mid.y += 4;
      const curve = new THREE.QuadraticBezierCurve3(p1, mid, p2);
      const c = new THREE.Color(DIRS[i].hex).lerp(new THREE.Color(DIRS[j].hex), 0.5);
      scene.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(curve.getPoints(32)),
        new THREE.LineBasicMaterial({ color:c, transparent:true, opacity:0.08 })
      ));
    }
  }
}

function buildLabels(){
  const container = document.getElementById('labels');
  nodeMeshes.forEach((node,i)=>{
    const el = document.createElement('div');
    el.className = 'node-label';
    el.textContent = papers[i].shortTitle;
    el.style.color = papers[i].color;
    container.appendChild(el);
    labelEls.push(el);
  });
}

function updateLabels(){
  nodeMeshes.forEach((node,i)=>{
    const v = node.position.clone();
    v.y += 0.5;
    v.project(camera);
    const el = labelEls[i];
    if(v.z < 1){
      el.style.display = 'block';
      el.style.left = ((v.x*0.5+0.5)*innerWidth)+'px';
      el.style.top = ((-v.y*0.5+0.5)*innerHeight)+'px';
      el.style.opacity = Math.max(0, 1 - v.z*1.2);
    } else {
      el.style.display = 'none';
    }
  });
}

function onResize(){
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}

function onMove(e){
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(nodeMeshes);

  if(hovered && (!hits.length || hits[0].object!==hovered)){
    hovered.scale.setScalar(1);
    hovered.material.emissiveIntensity = hovered.userData.baseEmissive;
    hovered = null;
    tip.classList.remove('show');
    renderer.domElement.style.cursor = 'default';
  }
  if(hits.length){
    const obj = hits[0].object;
    if(obj!==hovered){
      hovered = obj;
      hovered.scale.setScalar(1.6);
      hovered.material.emissiveIntensity = 1.4;
      renderer.domElement.style.cursor = 'pointer';
    }
    const p = papers[hovered.userData.paperId];
    document.getElementById('tipT').textContent = p.titleEn;
    document.getElementById('tipM').textContent = p.direction + ' · ' + p.journal;
    document.getElementById('tipM').style.color = p.color;
    tip.style.left = Math.min(e.clientX+16, innerWidth-320)+'px';
    tip.style.top = (e.clientY-12)+'px';
    tip.classList.add('show');
  }
}

function onClick(){
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(nodeMeshes);
  if(hits.length) openPanel(hits[0].object.userData.paperId);
}

function openPanel(id){
  const p = papers[id];
  const dir = DIRS.find(d=>d.name===p.direction);
  const stars = n => '★'.repeat(n)+'☆'.repeat(5-n);

  const methods = p.methods.map(m =>
    '<div class="method-item"><div class="method-name">'+m.name+'</div><div class="method-desc">'+m.desc+'</div></div>'
  ).join('');

  const innovs = p.innovations.map(inn =>
    '<div class="innov-item"><span class="innov-stars">'+stars(inn.stars)+'</span><span>'+inn.text+'</span></div>'
  ).join('');

  const tags = p.tags.map(t=>'<span class="tag">'+t+'</span>').join('');

  document.getElementById('panelBody').innerHTML =
    '<button class="panel-close" onclick="closePanel()">×</button>'
    + '<div class="p-dir" style="background:'+p.color+'14;color:'+p.color+';border:1px solid '+p.color+'30">'
    + '<span class="p-dir-dot" style="background:'+p.color+'"></span>'+p.direction+' · '+p.dirEn+'</div>'
    + '<div class="p-en">'+p.titleEn+'</div>'
    + '<div class="p-cn">'+p.titleCn+'</div>'
    + '<div class="p-meta"><strong>'+p.journal+'</strong><br>'+p.ifScore+'<br>'+p.authors+'<br><a href="'+p.doi+'" target="_blank">DOI ↗</a></div>'
    + '<div class="p-section"><div class="p-section-hd"><span class="icon">🎯</span>研究问题<span class="line"></span></div><div class="p-body accent-orange">'+p.problem+'</div></div>'
    + '<div class="p-section"><div class="p-section-hd"><span class="icon">🔬</span>解决方法<span class="line"></span></div><div class="p-body accent-green">'+p.solution+'</div></div>'
    + '<div class="p-section"><div class="p-section-hd"><span class="icon">🔄</span>替代方案<span class="line"></span></div><div class="p-body accent-purple">'+p.alternatives+'</div></div>'
    + '<div class="p-section"><div class="p-section-hd"><span class="icon">🔧</span>核心方法<span class="line"></span></div>'+methods+'</div>'
    + '<div class="p-section"><div class="p-section-hd"><span class="icon">⭐</span>创新点<span class="line"></span></div>'+innovs+'</div>'
    + '<div class="p-section"><div class="abstract-btn" onclick="this.nextElementSibling.classList.toggle(\'open\')">📝 中文摘要 <span style="font-size:9px">▼</span></div><div class="abstract-body">'+p.abstract+'</div></div>'
    + '<div class="tags">'+tags+'</div>'
    + '<div class="vec-box"><strong>💡 VEC关联性：</strong>'+p.vec+'</div>';

  document.getElementById('panel').classList.add('open');
}

function closePanel(){ document.getElementById('panel').classList.remove('open'); }

function focusDir(idx){
  const target = hubPos(idx);
  const dest = new THREE.Vector3(target.x*0.5+6, 10, target.z*0.5+14);
  const start = camera.position.clone();
  const t0 = Date.now();
  controls.autoRotate = false;

  (function anim(){
    const t = Math.min((Date.now()-t0)/1200, 1);
    const e = t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
    camera.position.lerpVectors(start, dest, e);
    controls.target.lerp(new THREE.Vector3(target.x, 1, target.z), e*0.1+0.02);
    controls.update();
    if(t<1) requestAnimationFrame(anim);
  })();
}

function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Hub animation
  hubMeshes.forEach(h=>{
    h.position.y = Math.sin(t*0.4+h.userData.phase)*0.4;
    h.userData.shell.rotation.y = t*0.15+h.userData.phase;
    h.userData.shell.rotation.x = Math.sin(t*0.2)*0.1;
    h.userData.ring.rotation.z = t*0.1;
    h.userData.core.rotation.y = t*0.3;
  });

  // Node float
  nodeMeshes.forEach(n=>{
    n.position.y = n.userData.baseY + Math.sin(t*0.6+n.userData.phase)*0.25;
    if(n!==hovered){
      n.material.emissiveIntensity = n.userData.baseEmissive + Math.sin(t*2+n.userData.phase)*0.15;
    }
  });

  // Dust rise
  if(dust){
    const arr = dust.geometry.attributes.position.array;
    for(let i=1;i<arr.length;i+=3){
      arr[i]+=0.004;
      if(arr[i]>20) arr[i]=-5;
    }
    dust.geometry.attributes.position.needsUpdate=true;
    dust.rotation.y = t*0.01;
  }

  controls.update();
  updateLabels();
  renderer.render(scene, camera);
}

init();
</script>
